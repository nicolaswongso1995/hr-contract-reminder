version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TALENTA_BASE_URL=${TALENTA_BASE_URL}
      - TALENTA_CLIENT_ID=${TALENTA_CLIENT_ID}
      - TALENTA_CLIENT_SECRET=${TALENTA_CLIENT_SECRET}
      - TALENTA_COMPANY_ID=${TALENTA_COMPANY_ID}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
      - USE_MOCK_DATA=${USE_MOCK_DATA:-true}
      - ENABLE_EMAIL_NOTIFICATIONS=${ENABLE_EMAIL_NOTIFICATIONS:-false}
      - ENABLE_WHATSAPP_NOTIFICATIONS=${ENABLE_WHATSAPP_NOTIFICATIONS:-false}
    restart: unless-stopped
    depends_on:
      - cron

  cron:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx tsx src/jobs/contractChecker.ts"
    environment:
      - NODE_ENV=production
      - CRON_SECRET=${CRON_SECRET}
      - NEXTAUTH_URL=http://app:3000
    restart: unless-stopped
    depends_on:
      - app

networks:
  default:
    name: hr-contract-network
